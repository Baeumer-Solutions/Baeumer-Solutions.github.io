<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESC}}">
<meta name="robots" content="index,follow">
<link rel="canonical" href="{{CANONICAL}}">
<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{DESC}}">
<meta property="og:image" content="https://cdn.prod.website-files.com/6a31544107cb9e6b141637f4/6a3266291eef41c92e1609f1_p12-og.png">
<meta property="og:url" content="{{CANONICAL}}">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/p12.css">
<script type="application/ld+json">
{"@context":"https://schema.org","@type":"Article","headline":{{TITLE_JSON}},"description":{{DESC_JSON}},"author":{"@type":"Organization","name":"Protect-12"},"publisher":{"@type":"Organization","name":"Protect-12"},"inLanguage":"de","datePublished":"{{DATE}}"}
</script>
<style>
  .article{max-width:800px;margin:0 auto}
  .article p{font-size:16.5px;line-height:1.72;margin:0 0 18px}
  .article h2{font-size:clamp(22px,3vw,32px);margin:40px 0 14px}
  .article h3{font-size:19px;margin:26px 0 10px;color:var(--navy)}
  .article ul,.article ol{margin:0 0 18px;padding-left:22px}
  .article li{margin-bottom:8px;font-size:16px}
  .article table{width:100%;border-collapse:collapse;margin:8px 0 20px;box-shadow:var(--shadow);background:#fff;font-size:14.5px}
  .article th{background:var(--navy);color:#fff;text-align:left;padding:12px 14px;font-size:13px;letter-spacing:.04em}
  .article td{padding:11px 14px;border-bottom:1px solid var(--grey)}
  .article tr:nth-child(even) td{background:var(--grey)}
  .article blockquote{background:var(--grey);border-left:3px solid var(--red);padding:18px 22px;margin:22px 0}
  .article blockquote p{margin:0;font-size:16px}
  .article blockquote b,.article blockquote strong{color:var(--navy)}
  .article a{color:var(--red);font-weight:600}
</style>
</head>
<body data-page="ratgeber">
<div id="p12-header"></div>
<header class="hero">
  <div id="radar-slot"></div>
  <div class="wrap">
    <span class="kicker">{{KICKER}}</span>
    <h1>{{H1}}</h1>
    <p class="lead">{{LEAD}}</p>
  </div>
</header>
<section>
  <div class="wrap article">
    <div class="reveal">
{{BODY}}
    </div>
  </div>
</section>
<section class="band">
  <div id="radar-slot2"></div>
  <div class="wrap">
    <span class="kicker">Der n&auml;chste Schritt</span>
    <h2>Wissen Sie, wo Ihr Haushalt wirklich steht?</h2>
    <p>Machen Sie den kostenlosen Schnelltest, oder sprechen Sie mit uns &uuml;ber eine vollst&auml;ndige Analyse Ihres Haushalts.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a class="btn btn-red" href="/faq-kontakt/#selfcheck">Zum Schnelltest</a>
      <a class="btn btn-ghost" data-cta href="#">Gespr&auml;ch vereinbaren</a>
    </div>
  </div>
</section>
<div id="p12-footer"></div>
<script src="/assets/p12.js"></script>
<script>
document.getElementById("radar-slot").innerHTML =
  '<svg class="radar" viewBox="0 0 600 600" aria-hidden="true"><g fill="none" stroke="#33465c" stroke-width="1"><circle cx="300" cy="300" r="70"/><circle cx="300" cy="300" r="140"/><circle cx="300" cy="300" r="210"/><circle cx="300" cy="300" r="280"/><line x1="300" y1="10" x2="300" y2="590"/><line x1="10" y1="300" x2="590" y2="300"/><line x1="90" y1="90" x2="510" y2="510"/><line x1="510" y1="90" x2="90" y2="510"/></g><circle cx="380" cy="228" r="4" fill="#C31212"/><circle cx="250" cy="360" r="3" fill="#E05A5A"/><circle cx="356" cy="356" r="3" fill="#E05A5A"/></svg><svg class="shield-wm" viewBox="0 0 100 120" aria-hidden="true"><path d="M50 4 L92 20 V60 C92 90 72 108 50 116 C28 108 8 90 8 60 V20 Z" fill="#ffffff"/></svg>';
document.getElementById("radar-slot2").innerHTML = document.querySelector("#radar-slot .radar").outerHTML;
</script>
</body>
</html>
